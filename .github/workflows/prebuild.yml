name: Build and publish prebuilt binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 2.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
          - os: ubuntu-22.04-arm
            arch: arm64
            platform: linux
          - os: macos-13
            arch: x64
            platform: darwin
          - os: macos-14
            arch: arm64
            platform: darwin
          - os: windows-2022
            arch: x64
            platform: win32

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: node

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build native addon
        run: npx node-gyp rebuild

      - name: Resolve version
        id: version
        run: echo "tag=${{ github.event.release.tag_name || inputs.version }}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Package prebuilt binary
        run: tar -czf parser-v${{ steps.version.outputs.tag }}-napi-v9-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C build/Release parser.node
        shell: bash

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: node/parser-v${{ steps.version.outputs.tag }}-napi-v9-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
