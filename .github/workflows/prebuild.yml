name: Build and publish prebuilt binaries

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
          - os: ubuntu-22.04-arm
            arch: arm64
            platform: linux
          - os: macos-13
            arch: x64
            platform: darwin
          - os: macos-14
            arch: arm64
            platform: darwin
          - os: windows-2022
            arch: x64
            platform: win32

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: node

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build native addon
        run: npx node-gyp rebuild

      - name: Package prebuilt binary
        run: tar -czf parser-v${{ github.event.release.tag_name }}-napi-v9-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C build/Release parser.node
        shell: bash

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: node/parser-v${{ github.event.release.tag_name }}-napi-v9-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
